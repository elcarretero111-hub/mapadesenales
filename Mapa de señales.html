<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Señales OSM (España) — con interruptores</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html,body{height:100%;margin:0;font-family:"Segoe UI",Arial,sans-serif}
  #map{width:100%;height:100%}

  .panel {
    position:absolute;
    right:12px;
    bottom:12px;
    z-index:1000;
    background:#fff;
    padding:12px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.18);
    max-width:280px;
    transition: transform .28s ease;
  }
  .panel.hidden { transform: translateX(112%); }
  .panel b { display:block; margin-bottom:8px; }

  .toggle-btn {
    position:absolute;
    left:-36px;
    top:50%;
    transform:translateY(-50%) rotate(0deg);
    width:34px;height:34px;border-radius:50%;
    background:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 5px rgba(0,0,0,0.15);cursor:pointer;
    transition: transform .22s ease, left .22s ease;
  }
  .toggle-btn.rotated { transform: translateY(-50%) rotate(180deg); }

  .panel img { vertical-align:middle; margin-right:8px; }
  .checkbox-item { display:flex; align-items:center; margin-bottom:6px; }

  .spinner {
    position:absolute;
    right:12px; top:12px; z-index:1200;
    background: rgba(255,255,255,0.95);
    padding:8px 12px;border-radius:8px;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    display:flex; align-items:center; gap:8px; font-size:13px;
  }
  .spinner .dot{width:10px;height:10px;border-radius:50%;background:#1976d2;animation: spin 1s linear infinite}
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

  @media (max-width:768px){
    .leaflet-control-zoom{display:none !important}
    .panel{right:8px;left:8px;bottom:8px}
    .toggle-btn{left:-30px}
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="spinner" id="spinner" style="display:none">
  <div class="dot"></div><div>Cargando señales...</div>
</div>

<div class="panel" id="panel">
  <div class="toggle-btn" id="toggleBtn" title="Ocultar/mostrar">▶</div>
  <b>Tipos de señal</b>
  <div id="legend"></div>
</div>

<script>
  const isMobile = window.innerWidth < 768;
  const map = L.map('map', { center:[40.4168,-3.7038], zoom: 13, zoomControl: !isMobile });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'© OpenStreetMap contributors' }).addTo(map);

  const ICONS = {
    'ES:R2': 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Spain_traffic_signal_r2%2C_2023_set.svg/512px-Spain_traffic_signal_r2%2C_2023_set.svg.png',
    'ES:R1': 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Spain_traffic_signal_r1.svg/512px-Spain_traffic_signal_r1.svg.png',
    'ES:S13': 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Spain_traffic_signal_s13%2C_2023_set.svg/512px-Spain_traffic_signal_s13%2C_2023_set.svg.png',
    'ES:S45': 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Spain_traffic_signal_s45%2C_2023_set.svg/512px-Spain_traffic_signal_s45%2C_2023_set.svg.png',
    'ES:S46': 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Spain_traffic_signal_s46%2C_2023_set.svg/512px-Spain_traffic_signal_s46%2C_2023_set.svg.png',
    'ES:P35': 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/10/Spain_traffic_signal_P-35_%282022%29.svg/512px-Spain_traffic_signal_P-35_%282022%29.svg.png'
  };

  const trafficLayers = {};
  Object.keys(ICONS).forEach(k => trafficLayers[k] = L.layerGroup().addTo(map));

  const spinner = document.getElementById('spinner');
  const showSpinner = ()=>spinner.style.display='flex';
  const hideSpinner = ()=>spinner.style.display='none';

  function genericDivIcon(size=36){
    return L.divIcon({
      html: `<div style="width:${size}px;height:${size}px;border-radius:6px;background:#1976d2;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">?</div>`,
      className:'',
      iconSize:[size,size],
      iconAnchor:[size/2,size]
    });
  }

  function createIconWithFallback(url, size=42) {
    return new Promise(resolve=>{
      const placeholder = genericDivIcon(size);
      const icon = L.icon({ iconUrl: url, iconSize:[size,size], iconAnchor:[size/2,size], popupAnchor:[0,-size/2] });
      const img = new Image();
      let done=false;
      img.onload=()=>{if(!done){done=true;resolve(icon);}};
      img.onerror=()=>{if(!done){done=true;resolve(placeholder);}};
      setTimeout(()=>{if(!done){done=true;resolve(placeholder);}},2500);
      img.src=url;
    });
  }

  let lastRequest = null;
  async function loadVisibleTraffic() {
    const b = map.getBounds();
    const south=b.getSouth(), west=b.getWest(), north=b.getNorth(), east=b.getEast();
    const widthKm = map.distance([south,west],[south,east]) / 1000;
    if (widthKm > 25) { Object.values(trafficLayers).forEach(l=>l.clearLayers()); console.log("Área demasiado grande (>25km)."); return; }

    const q = `[out:json][timeout:25];
      (
        node["traffic_sign"~"^ES:"](${south},${west},${north},${east});
      );
      out body;`;

    if (lastRequest && lastRequest.abort) lastRequest.abort();
    showSpinner();
    const controller = new AbortController();
    lastRequest = controller;
    try {
      const resp = await fetch("https://overpass-api.de/api/interpreter", { method:'POST', body:q, signal: controller.signal });
      if (!resp.ok) throw new Error("Overpass HTTP " + resp.status);
      const data = await resp.json();

      Object.values(trafficLayers).forEach(l=>l.clearLayers());

      const promises = data.elements.map(async el=>{
        if (el.type!=='node' || !el.tags?.traffic_sign) return null;
        const tag = el.tags.traffic_sign;
        let key = Object.keys(ICONS).find(k=>tag.includes(k));
        if (!key) return null;
        const icon = await createIconWithFallback(ICONS[key]);
        const m = L.marker([el.lat, el.lon], {icon}).bindPopup(`<b>Señal:</b> ${tag}`);
        trafficLayers[key].addLayer(m);
      });
      await Promise.all(promises);
      console.log(`→ ${data.elements.length} señales totales.`);
    } catch(err) {
      if (err.name!=='AbortError') console.error("Error Overpass:", err);
    } finally {
      hideSpinner();
      lastRequest=null;
    }
  }

  map.on('moveend', loadVisibleTraffic);
  loadVisibleTraffic();

  // Panel lateral con interruptores
  const panel = document.getElementById('panel');
  const toggleBtn = document.getElementById('toggleBtn');
  toggleBtn.addEventListener('click',()=>{
    panel.classList.toggle('hidden');
    toggleBtn.classList.toggle('rotated');
  });

  const legend = document.getElementById('legend');
  legend.innerHTML = Object.entries({
    'ES:R2':'STOP (R-2)',
    'ES:R1':'Ceda el paso (R-1)',
    'ES:S13':'Paso peatones (S-13)',
    'ES:S45':'Paso ciclistas (S-45)',
    'ES:S46':'Paso conjunto (S-46)',
    'ES:P35':'Confluencia carriles (P-35)'
  }).map(([code,label])=>`
    <div class="checkbox-item">
      <input type="checkbox" id="${code}" checked style="margin-right:6px;">
      <img src="${ICONS[code]}" width="26" height="26"/> ${label}
    </div>
  `).join("");

  // Manejadores de checkboxes
  Object.keys(ICONS).forEach(code=>{
    document.getElementById(code).addEventListener('change', e=>{
      if (e.target.checked) map.addLayer(trafficLayers[code]);
      else map.removeLayer(trafficLayers[code]);
    });
  });
</script>
</body>
</html>
