<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Mapa de señales OSM España</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{
    height:100%;
    margin:0;
    font-family:"Segoe UI",Arial,sans-serif;
}

#map{
    width:100%;
    height:100%;
}

.panel{
    position:absolute;
    right:12px;
    bottom:12px;
    z-index:1000;
    background:white;
    padding:12px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.18);
    max-width:280px;
    transition:transform .28s ease;
}

.panel.hidden{
    transform:translateX(112%);
}

.toggle-btn{
    position:absolute;
    left:-36px;
    top:50%;
    transform:translateY(-50%);
    width:34px;
    height:34px;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 1px 5px rgba(0,0,0,0.15);
}

.panel img{
    vertical-align:middle;
    margin-right:8px;
}

.checkbox-item{
    display:flex;
    align-items:center;
    margin-bottom:6px;
}

.spinner{
    position:absolute;
    top:12px;
    right:12px;
    z-index:1200;
    background:rgba(255,255,255,.95);
    padding:8px 12px;
    border-radius:8px;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
    display:flex;
    align-items:center;
    gap:8px;
}

.spinner .dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#1976d2;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0)}
    to{transform:rotate(360deg)}
}

@media(max-width:768px){
    .leaflet-control-zoom{
        display:none !important;
    }

    .panel{
        right:8px;
        left:8px;
        bottom:8px;
    }
}
</style>
</head>

<body>

<div id="map"></div>

<div class="spinner" id="spinner" style="display:none">
    <div class="dot"></div>
    <div>Cargando señales...</div>
</div>

<div class="panel" id="panel">
    <div class="toggle-btn" id="toggleBtn">▶</div>

    <b>Tipos de señal</b>

    <div id="legend"></div>
</div>

<script>

const isMobile = window.innerWidth < 768;

const map = L.map('map',{
    center:[40.4168,-3.7038],
    zoom:13,
    zoomControl:!isMobile
});

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        maxZoom:19,
        attribution:'© OpenStreetMap contributors'
    }
).addTo(map);

/* ICONOS LOCALES */

const ICONS = {
    'ES:R2':'icons/R2.svg',
    'ES:R1':'icons/R1.svg',
    'ES:S13':'icons/S13.svg',
    'ES:S45':'icons/S45.svg',
    'ES:S46':'icons/S46.svg',
    'ES:P35':'icons/P35.svg'
};

const SIGNAL_NAMES = {
    'ES:R2':'STOP (R-2)',
    'ES:R1':'Ceda el paso (R-1)',
    'ES:S13':'Paso peatones (S-13)',
    'ES:S45':'Paso ciclistas (S-45)',
    'ES:S46':'Paso conjunto (S-46)',
    'ES:P35':'Confluencia carriles (P-35)'
};

const trafficLayers = {};

Object.keys(ICONS).forEach(code=>{
    trafficLayers[code] = L.layerGroup().addTo(map);
});

function createIcon(url,size=42){

    return L.icon({
        iconUrl:url,
        iconSize:[size,size],
        iconAnchor:[size/2,size],
        popupAnchor:[0,-size/2]
    });

}

const spinner = document.getElementById("spinner");

function showSpinner(){
    spinner.style.display="flex";
}

function hideSpinner(){
    spinner.style.display="none";
}

let lastRequest = null;

async function loadVisibleTraffic(){

    const b = map.getBounds();

    const south = b.getSouth();
    const west = b.getWest();
    const north = b.getNorth();
    const east = b.getEast();

    const widthKm =
        map.distance([south,west],[south,east]) / 1000;

    if(widthKm > 25){

        Object.values(trafficLayers)
            .forEach(layer=>layer.clearLayers());

        return;
    }

    const query = `
    [out:json][timeout:25];
    (
      node["traffic_sign"~"^ES:"](${south},${west},${north},${east});
    );
    out body;
    `;

    if(lastRequest && lastRequest.abort){
        lastRequest.abort();
    }

    const controller = new AbortController();
    lastRequest = controller;

    showSpinner();

    try{

        const response = await fetch(
            "https://overpass-api.de/api/interpreter",
            {
                method:"POST",
                body:query,
                signal:controller.signal
            }
        );

        const data = await response.json();

        Object.values(trafficLayers)
            .forEach(layer=>layer.clearLayers());

        for(const el of data.elements){

            if(
                el.type !== "node" ||
                !el.tags?.traffic_sign
            ){
                continue;
            }

            const tag = el.tags.traffic_sign;

            const key =
                Object.keys(ICONS)
                .find(code=>tag.includes(code));

            if(!key){
                continue;
            }

            const marker = L.marker(
                [el.lat,el.lon],
                {
                    icon:createIcon(ICONS[key])
                }
            );

            marker.bindPopup(
                `<b>Señal:</b> ${tag}`
            );

            trafficLayers[key].addLayer(marker);

        }

        console.log(
            `→ ${data.elements.length} señales totales`
        );

    }
    catch(err){

        if(err.name !== "AbortError"){
            console.error(err);
        }

    }
    finally{

        hideSpinner();
        lastRequest = null;

    }

}

map.on("moveend",loadVisibleTraffic);

loadVisibleTraffic();

/* PANEL */

const panel = document.getElementById("panel");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.addEventListener("click",()=>{

    panel.classList.toggle("hidden");

});

/* LEYENDA */

const legend =
    document.getElementById("legend");

legend.innerHTML = Object.entries(
    SIGNAL_NAMES
)
.map(([code,label])=>`

<div class="checkbox-item">
<input
type="checkbox"
id="${code}"
checked
style="margin-right:6px;"
>

<img
src="${ICONS[code]}"
width="26"
height="26"
>

${label}
</div>

`).join("");

Object.keys(ICONS).forEach(code=>{

    document
    .getElementById(code)
    .addEventListener("change",e=>{

        if(e.target.checked){
            map.addLayer(
                trafficLayers[code]
            );
        }
        else{
            map.removeLayer(
                trafficLayers[code]
            );
        }

    });

});

</script>

</body>
</html>
